<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Tap+</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080c;--s1:#0e0f15;--s2:#15171f;--s3:#1c1e28;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);
  --g:#00e5a0;--o:#ff6b35;--p:#7c6aff;--y:#ffd166;
  --tx:#eef0f8;--mu:rgba(238,240,248,0.38);--rd:#ff4455;--ai:#a78bfa;
  --f:'Nunito',system-ui,-apple-system,sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-font-smoothing:antialiased}
body{overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(0,229,160,0.04) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 90% 100%,rgba(124,106,255,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.28}}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
input,select,textarea{font-family:var(--f);color:var(--tx);-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--mu)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}
#app{position:relative;z-index:1;min-height:100vh}
.view{display:none;min-height:100vh;flex-direction:column}
.view.on{display:flex;animation:up .22s ease}

/* ── HUB ── */
.hub{align-items:center;justify-content:center;padding:48px 24px;text-align:center}
.hub-logo{font-size:48px;font-weight:900;letter-spacing:-0.04em;margin-bottom:6px;background:linear-gradient(135deg,#fff 60%,rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{background:linear-gradient(135deg,var(–g),var(–p));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-tag{color:var(–mu);font-size:13px;margin-bottom:46px;font-weight:500}
.hub-cards{display:flex;flex-direction:column;gap:11px;width:100%;max-width:360px;margin-bottom:20px}
.hub-card{display:flex;align-items:center;gap:14px;background:var(–s1);border:1px solid var(–b);border-radius:18px;padding:20px 22px;cursor:pointer;text-align:left;transition:border-color .18s,transform .15s}
.hub-card:active{transform:scale(.98)}
.hub-card-ico{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hub-card-title{font-size:15px;font-weight:700;margin-bottom:3px;letter-spacing:-.01em}
.hub-card-sub{font-size:12px;color:var(–mu);line-height:1.5}
.hub-card-arrow{font-size:16px;color:var(–mu);margin-left:auto;flex-shrink:0}
.ai-status{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;transition:color .2s;font-weight:500;margin-top:2px}
.ai-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.admin-btn{position:absolute;top:16px;left:16px;background:none;border:none;color:rgba(238,240,248,.1);font-size:16px;cursor:pointer;padding:6px;border-radius:7px;transition:color .2s;font-family:var(–f)}

/* ── PIN ── */
.pin-view{align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.pin-back{position:absolute;top:18px;left:18px;background:none;border:none;color:var(–mu);font-size:22px;cursor:pointer}
.pin-title{font-size:22px;font-weight:800;margin-bottom:5px;letter-spacing:-.02em}
.pin-sub{color:var(–mu);font-size:13px;margin-bottom:26px;font-weight:500}
.pin-dots{display:flex;gap:11px;justify-content:center;margin-bottom:22px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.15);transition:all .18s}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:210px}
.pin-key{background:var(–s1);border:1px solid var(–b);border-radius:13px;padding:16px;font-size:19px;font-weight:700;cursor:pointer;text-align:center;user-select:none;-webkit-user-select:none;transition:background .1s}
.pin-key:active{background:var(–s2)}
.pin-err{color:var(–rd);font-size:13px;margin-top:11px;min-height:18px;font-weight:500}
.pin-hint{font-size:11px;color:rgba(238,240,248,.2);margin-top:14px;font-weight:500}

/* ── DASH ── */
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(–b);flex-shrink:0;gap:10px}
.dash-name{font-size:15px;font-weight:800;letter-spacing:-.02em}
.dash-sub{font-size:11px;color:var(–mu);margin-top:2px;font-weight:500}
.dash-exit{background:var(–s2);border:1px solid var(–b);border-radius:8px;color:var(–mu);font-size:12px;padding:7px 12px;cursor:pointer;font-family:var(–f);font-weight:600}
.dash-tabs{display:flex;padding:0 18px;border-bottom:1px solid var(–b);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.dash-tabs::-webkit-scrollbar{display:none}
.dash-tab{background:none;border:none;font-size:11px;font-weight:700;color:var(–mu);cursor:pointer;padding:11px 11px 9px;border-bottom:2px solid transparent;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:var(–f);transition:color .15s}
.dash-tab.active{color:var(–g);border-bottom-color:var(–g)}
.dash-tab.ai.active{color:var(–ai);border-bottom-color:var(–ai)}
.dash-body{padding:18px;overflow-y:auto;flex:1}

/* ── CARDS ── */
.ai-card{background:linear-gradient(135deg,rgba(167,139,250,.05),rgba(129,140,248,.02));border:1px solid rgba(167,139,250,.14);border-radius:16px;padding:18px;position:relative;overflow:hidden;margin-bottom:13px}
.ai-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.3),transparent)}
.ai-card-head{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.ai-card-ico{width:34px;height:34px;border-radius:9px;background:rgba(167,139,250,.1);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ai-card-title{font-size:14px;font-weight:800;letter-spacing:-.01em}
.ai-card-sub{font-size:11px;color:var(–mu);margin-top:2px;font-weight:500}
.plain-card{background:var(–s1);border:1px solid var(–b);border-radius:14px;padding:15px 16px;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
.stat-box{background:var(–s1);border:1px solid var(–b);border-radius:12px;padding:12px 8px;text-align:center}
.stat-val{font-size:20px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-.03em}
.stat-lbl{font-size:9px;color:var(–mu);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.sec-lbl{font-size:10px;font-weight:700;color:var(–mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
.ai-mini-dot{width:6px;height:6px;border-radius:50%;background:var(–ai);display:inline-block;animation:pulse 2s ease infinite;flex-shrink:0}

/* ── AI OUTPUT ── */
.ai-out{background:rgba(20,22,30,.9);border:1px solid rgba(167,139,250,.16);border-radius:12px;padding:15px;margin-top:11px;animation:up .3s ease}
.ai-out-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(–ai);margin-bottom:9px;display:flex;align-items:center;gap:5px}
.ai-out-text{font-size:13px;line-height:1.75;color:rgba(238,240,248,.83)}
.ai-out-text strong{color:var(–tx);font-weight:700}
.ai-refresh{margin-top:9px;font-size:11px;color:rgba(238,240,248,.22);background:none;border:none;cursor:pointer;font-family:var(–f);font-weight:500}
.ai-loading{display:flex;align-items:center;gap:9px;color:var(–mu);font-size:13px;padding:15px 0;font-weight:500}
.ai-spinner{width:16px;height:16px;border:2px solid rgba(167,139,250,.15);border-top-color:var(–ai);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
.ai-nokey{background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.18);border-radius:10px;padding:12px 13px;font-size:13px;color:var(–o);line-height:1.6;font-weight:500}
.ai-err{color:var(–rd);font-size:13px;font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:var(–f);font-weight:700;letter-spacing:-.01em;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(–g);color:#07080c;border-radius:12px;padding:12px 20px;font-size:13px}
.btn-ghost{background:var(–s2);color:var(–mu);border:1px solid var(–b);border-radius:10px;padding:9px 14px;font-size:12px}
.btn-ai{background:linear-gradient(135deg,rgba(167,139,250,.16),rgba(129,140,248,.12));border:1px solid rgba(167,139,250,.28);color:var(–ai);border-radius:11px;padding:10px 17px;font-size:13px}
.btn-danger{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.22);color:var(–rd);border-radius:10px;padding:9px 14px;font-size:12px}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:9px}
.btn-full{width:100%}

/* ── INPUT ── */
.inp{width:100%;background:var(–s2);border:1px solid var(–b);border-radius:10px;padding:11px 13px;color:var(–tx);font-size:14px;outline:none;transition:border-color .18s;font-family:var(–f);font-weight:500}
.inp:focus{border-color:rgba(167,139,250,.45)}
.sel{width:100%;background:var(–s2);border:1px solid var(–b);border-radius:10px;padding:11px 13px;color:var(–tx);font-size:14px;outline:none;cursor:pointer;font-family:var(–f);font-weight:500}
.field-lbl{font-size:11px;font-weight:700;color:var(–mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:18px}
.modal{background:var(–s1);border:1px solid var(–b2);border-radius:20px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;animation:up .2s ease}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-.02em}
.modal-close{background:none;border:none;color:var(–mu);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}

/* ── LB ── */
.lb-banner{background:linear-gradient(135deg,rgba(167,139,250,.08),transparent);border:1px solid rgba(167,139,250,.14);border-radius:12px;padding:12px 15px;margin-bottom:13px;display:flex;align-items:center;gap:10px}
.lb-item{display:flex;align-items:center;background:var(–s1);border:1px solid var(–b);border-radius:14px;padding:13px 15px;gap:12px;margin-bottom:8px}
.lb-item.r1{border-color:rgba(255,209,102,.28)}
.lb-item.r2{border-color:rgba(200,200,200,.16)}
.lb-item.r3{border-color:rgba(205,127,50,.18)}
.lb-rank{font-size:17px;font-weight:900;width:24px;text-align:center;flex-shrink:0}
.lb-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.lb-nm{font-size:13px;font-weight:700;margin-bottom:2px}
.lb-st{font-size:11px;color:var(–mu);font-weight:500}
.lb-sc{text-align:right;flex-shrink:0}
.lb-sc-val{font-size:20px;font-weight:900;color:var(–g);letter-spacing:-.03em;line-height:1}
.lb-sc-lbl{font-size:9px;color:var(–mu);text-transform:uppercase;letter-spacing:.08em;font-weight:700}

/* ── ANALYTICS BAR ── */
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar-nm{font-size:11px;width:56px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-v{font-size:11px;font-weight:700;width:28px;text-align:right;flex-shrink:0}

/* ── STAFF PILLS ── */
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.pill{background:var(–s2);border:1px solid var(–b);border-radius:100px;padding:6px 13px;font-size:12px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .15s}
.pill.active{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.35);color:var(–ai)}
.pill-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800}

/* ── TAP PAGE ── */
.tap-view{align-items:center;padding:52px 24px 40px;text-align:center;min-height:100vh}
.tap-av{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;margin:0 auto 14px;flex-shrink:0}
.tap-stars{display:flex;gap:9px;justify-content:center;margin-bottom:28px}
.tap-star{font-size:38px;cursor:pointer;transition:transform .15s,filter .15s;filter:brightness(.25)}
.tap-star.on{filter:brightness(1)}
.tap-star:active{transform:scale(.88)}
.tap-link{display:flex;align-items:center;gap:13px;background:var(–s1);border:1px solid var(–b2);border-radius:14px;padding:15px 17px;text-decoration:none;color:var(–tx);margin-bottom:9px;transition:border-color .18s;text-align:left}
.tap-link:active{transform:scale(.98)}
.tap-textarea{width:100%;background:var(–s1);border:1px solid var(–b2);border-radius:12px;padding:12px 13px;color:var(–tx);font-size:14px;resize:none;outline:none;font-family:var(–f);font-weight:500;line-height:1.5}

/* ── ADMIN ── */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:15px}
.admin-panel{background:var(–s1);border:1px solid var(–b2);border-radius:20px;width:100%;max-width:480px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column;animation:up .2s ease}
.admin-tabs{display:flex;padding:0 18px;border-bottom:1px solid var(–b);flex-shrink:0}
.admin-tab{background:none;border:none;font-size:11px;font-weight:700;color:var(–mu);cursor:pointer;padding:11px 11px 9px;border-bottom:2px solid transparent;letter-spacing:.04em;text-transform:uppercase;font-family:var(–f);transition:color .15s}
.admin-tab.active{color:var(–g);border-bottom-color:var(–g)}
.admin-body{padding:18px;overflow-y:auto;flex:1}
.link-row{display:flex;align-items:center;gap:9px;background:var(–s2);border:1px solid var(–b);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.link-ico{font-size:22px;flex-shrink:0}
.color-swatch{width:27px;height:27px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform .15s}
.color-swatch:active{transform:scale(.88)}
.color-swatch.sel{box-shadow:0 0 0 3px rgba(255,255,255,.8)}

/* ── SETUP ── */
.setup-view{align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.setup-card{background:var(–s1);border:1px solid rgba(167,139,250,.18);border-radius:18px;padding:22px 20px;width:100%;max-width:400px;text-align:left}
.setup-steps{background:var(–s2);border-radius:10px;padding:13px;margin-bottom:15px}
.setup-step{display:flex;gap:9px;margin-bottom:9px;font-size:13px;color:var(–mu);line-height:1.5;align-items:flex-start;font-weight:500}
.setup-step:last-child{margin-bottom:0}
.step-num{width:19px;height:19px;border-radius:50%;background:rgba(167,139,250,.15);color:var(–ai);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ── ESTIMATOR ── */
.est-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.est-card{background:var(–s2);border:1px solid var(–b);border-radius:12px;padding:14px;text-align:center}
.est-val{font-size:24px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-.03em}
.est-lbl{font-size:10px;color:var(–mu);font-weight:600}

@media(max-width:400px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
</style>

</head>
<body>
<div id="app" style="min-height:100vh">
  <!-- views injected by JS -->
</div>

<script src="./app.js"></script>

</body>
</html>
