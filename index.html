const getStats = (taps=[]) => {
const reviews=taps.filter(t=>t.review).length;
const ratings=taps.map(t=>t.rating);
const avg=ratings.length?ratings.reduce((a,b)=>a+b,0)/ratings.length:0;

return{taps:taps.length,reviews,ratings,avgStr:avg?avg.toFixed(1):”—”,weekTaps:wt,score,ctr,negFb,
gC:taps.filter(t=>t.platform===“google”).length};
};

// ─── GROQ ────────────────────────────────────────────────────────────────────
async function callGroq(prompt, key) {
const sys = “You are TapTrack AI, a restaurant performance analyst. Be specific with numbers. Use **bold**, ## headings, - bullet points. Keep it concise and actionable. Never invent data.”;
const r = await fetch(GROQ_URL,{method:“POST”,headers:{“Content-Type”:“application/json”,“Authorization”:`Bearer ${key}`},body:JSON.stringify({model:GROQ_MODEL,messages:[{role:“system”,content:sys},{role:“user”,content:prompt}],max_tokens:900,temperature:0.7})});
if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(r.status===401?“INVALID_KEY”:e?.error?.message||“API error”);}
const d=await r.json();
return d.choices?.[0]?.message?.content||””;
}

// ─── UI PRIMITIVES ───────────────────────────────────────────────────────────
const ss = (obj) => obj; // passthrough for inline styles

function Btn({children,onClick,variant=“primary”,size=“md”,disabled,full,style:extra}){
const base={border:“none”,cursor:disabled?“not-allowed”:“pointer”,display:“inline-flex”,alignItems:“center”,justifyContent:“center”,gap:6,fontWeight:600,letterSpacing:”-0.01em”,transition:“all 0.15s”,opacity:disabled?0.5:1,whiteSpace:“nowrap”,…extra};
const sizes={sm:{padding:“6px 12px”,fontSize:12,borderRadius:8},md:{padding:“10px 18px”,fontSize:13,borderRadius:10},lg:{padding:“13px 22px”,fontSize:14,borderRadius:12}};
const variants={
primary:{background:“var(–accent)”,color:”#08090c”},
ghost:{background:“var(–s2)”,color:“var(–muted)”,border:“1px solid var(–border)”},
ai:{background:“linear-gradient(135deg,rgba(167,139,250,0.18),rgba(129,140,248,0.14))”,border:“1px solid rgba(167,139,250,0.3)”,color:“var(–ai)”},
danger:{background:“rgba(255,68,85,0.12)”,border:“1px solid rgba(255,68,85,0.25)”,color:“var(–danger)”},
outline:{background:“transparent”,border:“1px solid var(–border2)”,color:“var(–text)”},
};
return <button onClick={onClick} disabled={disabled} style={{…base,…sizes[size],…variants[variant],width:full?“100%”:undefined}}>{children}</button>;

function Input({value,onChange,placeholder,type=“text”,onKeyDown,style:extra,autoFocus}){

}

function Select({value,onChange,children,style:extra}){

</select>;
}

function Modal({title,onClose,children,width=420}){

function AiDot(){return <span style={{width:6,height:6,borderRadius:“50%”,background:“var(–ai)”,display:“inline-block”,animation:“pulse 2s ease infinite”,flexShrink:0}}/>;}

function AiBlock({prompt,apiKey,ckey,msg=“Analyzing…”}){
const cache=useRef({});
const[st,setSt]=useState(“idle”);
const[text,setText]=useState(””);
const[err,setErr]=useState(””);
const ran=useRef(false);

const run=useCallback(async(force=false)=>{
if(!apiKey){setSt(“nokey”);return;}
const k=ckey||prompt.slice(0,80);
if(!force&&cache.current[k]){setText(cache.current[k]);setSt(“done”);return;}
setSt(“loading”);setErr(””);
try{const t=await callGroq(prompt,apiKey);cache.current[k]=t;setText(t);setSt(“done”);}
catch(e){setErr(e.message);setSt(“err”);}
},[prompt,apiKey,ckey]);

useEffect(()=>{if(!ran.current&&prompt&&apiKey){ran.current=true;run();}},[]);

if(!apiKey||st===“nokey”) return (
<div style={{background:“rgba(255,107,53,0.08)”,border:“1px solid rgba(255,107,53,0.2)”,borderRadius:10,padding:“12px 14px”,fontSize:13,color:“var(–a2)”,lineHeight:1.6}}>
⚠️ No Groq API key — return to home and tap the AI status dot to connect.
</div>
);
if(st===“idle”) return <Btn variant=“ai” onClick={()=>run()}>✦ Generate AI Analysis</Btn>;
if(st===“loading”) return (
<div style={{display:“flex”,alignItems:“center”,gap:10,color:“var(–muted)”,fontSize:13,padding:“16px 0”}}>
<div style={{width:16,height:16,border:“2px solid rgba(167,139,250,0.2)”,borderTopColor:“var(–ai)”,borderRadius:“50%”,animation:“spin .7s linear infinite”,flexShrink:0}}/>
{msg}
</div>
);
if(st===“err”) return (
<div>
<div style={{color:“var(–danger)”,fontSize:13,marginBottom:8}}>{err===“INVALID_KEY”?“❌ Invalid key — update from home screen”:`❌ ${err}`}</div>
<Btn variant=“ghost” size=“sm” onClick={()=>run(true)}>↻ Retry</Btn>
</div>
);
return (
<div style={{background:“rgba(22,24,31,0.9)”,border:“1px solid rgba(167,139,250,0.18)”,borderRadius:12,padding:16,marginTop:12,animation:“fadeIn 0.3s ease”}}>
<div style={{fontSize:10,fontWeight:600,letterSpacing:“0.12em”,textTransform:“uppercase”,color:“var(–ai)”,marginBottom:10,display:“flex”,alignItems:“center”,gap:6}}>
<AiDot/> AI Analysis
</div>
<MdText text={text}/>
<button onClick={()=>{delete cache.current[ckey||prompt.slice(0,80)];run(true);}} style={{marginTop:10,fontSize:11,color:“rgba(240,242,248,0.25)”,background:“none”,border:“none”,cursor:“pointer”}}>↻ Refresh</button>
</div>
);
}

function MdText({text}){
const bold=s=>s.replace(/**(.*?)**/g,(_,t)=>`<strong style="color:#f0f2f8;font-weight:600">${t}</strong>`);
return (
<div style={{fontSize:14,lineHeight:1.75,color:“rgba(240,242,248,0.85)”}}>
{text.split(”\n”).map((line,i)=>{
if(line.startsWith(”## “)) return <div key={i} style={{fontWeight:700,fontSize:14,margin:“12px 0 6px”,color:“var(–text)”}}>{line.slice(3)}</div>;
if(line.startsWith(”### “)) return <div key={i} style={{fontWeight:600,fontSize:11,color:“var(–ai)”,margin:“10px 0 5px”,textTransform:“uppercase”,letterSpacing:“0.08em”}}>{line.slice(4)}</div>;
if(line.startsWith(”- “)) return <div key={i} style={{display:“flex”,gap:8,marginBottom:5}}><span style={{color:“var(–ai)”,flexShrink:0,marginTop:2}}>›</span><span dangerouslySetInnerHTML={{__html:bold(line.slice(2))}}/></div>;
if(!line) return <br key={i}/>;
return <div key={i} dangerouslySetInnerHTML={{__html:bold(line)}}/>;
})}
</div>
);
}

// ─── PIN PAD ─────────────────────────────────────────────────────────────────
function PinPad({title,sub,hint,dotColor=”#00e5a0”,onBack,onOk}){
const[val,setVal]=useState(””); const[err,setErr]=useState(””);
const tap=k=>{
if(k===“C”){setVal(””);setErr(””);return;}
if(k===“⌫”){setVal(v=>v.slice(0,-1));return;}
if(val.length>=4)return;
const n=val+k;setVal(n);
if(n.length===4)setTimeout(()=>{if(onOk(n))setVal(””);else{setErr(“Incorrect. Try again.”);setVal(””);}},180);
};
return (
<div style={{display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,minHeight:“100vh”,padding:“40px 20px”,textAlign:“center”,position:“relative”,zIndex:1}}>
{onBack&&<button onClick={onBack} style={{position:“absolute”,top:20,left:20,background:“none”,border:“none”,color:“var(–muted)”,fontSize:20,cursor:“pointer”}}>←</button>}
<div style={{fontWeight:700,fontSize:22,marginBottom:6}}>{title}</div>
<div style={{color:“var(–muted)”,fontSize:13,marginBottom:28}}>{sub}</div>
<div style={{display:“flex”,gap:12,justifyContent:“center”,marginBottom:22}}>
{[0,1,2,3].map(i=><div key={i} style={{width:13,height:13,borderRadius:“50%”,border:`2px solid ${i<val.length?dotColor:"rgba(255,255,255,0.15)"}`,background:i<val.length?dotColor:“transparent”,transition:“all .2s”}}/>)}
</div>
<div style={{display:“grid”,gridTemplateColumns:“repeat(3,1fr)”,gap:9,maxWidth:210}}>
{[“1”,“2”,“3”,“4”,“5”,“6”,“7”,“8”,“9”,“C”,“0”,“⌫”].map(k=>(
<div key={k} onClick={()=>tap(k)} style={{background:“var(–s1)”,border:“1px solid var(–border)”,borderRadius:12,padding:16,fontSize:k===“C”||k===“⌫”?12:19,fontWeight:600,cursor:“pointer”,color:k===“C”?“var(–muted)”:“var(–text)”,textAlign:“center”,userSelect:“none”,WebkitUserSelect:“none”,transition:“background 0.1s”}}>{k}</div>
))}
</div>
<div style={{color:“var(–danger)”,fontSize:13,marginTop:12,minHeight:18}}>{err}</div>
{hint&&<div style={{fontSize:11,color:“rgba(240,242,248,0.25)”,marginTop:14}}>{hint}</div>}
</div>
);
}

}

function Estimator({staff,apiKey}){
const defAvg=4.2;
const[f,setF]=useState({plat:“google”,count:“71”,cur:“4.2”,tgt:“4.5”,avg:String(defAvg)});
const[res,setRes]=useState(null);
const iS={width:“100%”,background:“var(–s2)”,border:“1px solid var(–border)”,borderRadius:10,padding:“10px 13px”,color:“var(–text)”,fontSize:14,outline:“none”,marginBottom:10};
const calc=()=>{
const c=parseInt(f.count)||0,cur=parseFloat(f.cur)||0,tgt=parseFloat(f.tgt)||0,avg=parseFloat(f.avg)||0;
if(!c||!cur||!tgt||!avg)return;
if(tgt<=cur){setRes({type:“done”});return;}
if(avg<=tgt){setRes({type:“low”});return;}
const n=Math.max(0,Math.ceil((tgt*(c+1)-cur*c)/(avg-tgt)));
const tps=Math.ceil(n/0.65);
const pace=Math.max(1,staff.filter(s=>s.active).length*3);
const wks=Math.ceil(tps/pace);
setRes({type:“calc”,n,tps,wks,avg,prompt:`Restaurant wants ${f.plat} from ${cur}★ to ${tgt}★. Facts: ${c} reviews, team avg ${avg}★ from NFC taps, ~${n} more 5★ needed, ~${tps} taps at 65% CTR, ~${wks} weeks. Give: 1) Realistic timeframe 2) Key strategy 3) 2 tactics 4) One risk. Under 180 words.`});
};
return (
<AiCard icon="📈" title="Platform Rating Estimator" sub="AI predicts what you need to hit your target">
<label style={{fontSize:11,fontWeight:500,color:“var(–muted)”,marginBottom:5,display:“block”,textTransform:“uppercase”,letterSpacing:“0.08em”}}>Platform</label>
<select value={f.plat} onChange={e=>setF(p=>({…p,plat:e.target.value}))} style={{…iS,cursor:“pointer”}}>
<option value="google">Google Reviews</option><option value="yelp">Yelp</option><option value="tripadvisor">Tripadvisor</option>
